<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --border: #e8e4df;
      --text: #2c2a27;
      --text-muted: #8a8580;
      --student-bg: #eef0f5;
      --tutor-bg: #f7f5f0;
      --accent: #5a7a64;
      --accent-hover: #4a6854;
      --error: #b44;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-subtle {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-subtle:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 88%;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 0.94rem;
      line-height: 1.6;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.student {
      align-self: flex-end;
      background: var(--student-bg);
      border-bottom-right-radius: 4px;
    }

    .message.tutor {
      align-self: flex-start;
      background: var(--tutor-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message .label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .message.tutor .label { color: var(--accent); }

    .message p { margin-bottom: 8px; }
    .message p:last-child { margin-bottom: 0; }

    /* Attached images in messages */
    .message-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .message-attachments img {
      max-width: 240px;
      max-height: 180px;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: contain;
      background: white;
    }

    .file-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .file-badge svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      padding: 14px 18px;
      background: var(--tutor-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      display: none;
    }

    .typing.visible { display: flex; gap: 5px; align-items: center; }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-muted);
      gap: 8px;
      padding: 40px 0;
    }

    .empty-state h2 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
    }

    .empty-state p {
      font-size: 0.88rem;
      max-width: 380px;
      line-height: 1.5;
    }

    /* Input area */
    #input-area {
      flex-shrink: 0;
      padding: 16px 0 24px;
      border-top: 1px solid var(--border);
    }

    /* File preview strip */
    #file-preview {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    #file-preview.has-files { display: flex; }

    .preview-item {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 28px 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text);
      animation: fadeIn 0.15s ease;
    }

    .preview-item img {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border-radius: 4px;
    }

    .preview-item .pdf-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0e8e0;
      border-radius: 4px;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .preview-item .remove-file {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: var(--text-muted);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 0.65rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    .preview-item .remove-file:hover {
      background: var(--error);
    }

    #input-form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #attach-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s ease;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #attach-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    #attach-btn svg {
      width: 20px;
      height: 20px;
    }

    #file-input { display: none; }

    #message-input {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.94rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      resize: none;
      min-height: 46px;
      max-height: 160px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s ease;
    }

    #message-input:focus {
      border-color: var(--accent);
    }

    #message-input::placeholder {
      color: var(--text-muted);
    }

    #send-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s ease;
      white-space: nowrap;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Transcript modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
    }

    .modal-body {
      padding: 18px 22px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body pre {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--text);
    }

    .modal-footer {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-primary {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--error);
      color: white;
      font-size: 0.85rem;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }

    .toast.visible { display: block; }

    /* Responsive */
    @media (max-width: 520px) {
      body { padding: 0 12px; }
      header h1 { font-size: 1.15rem; }
      .message { max-width: 94%; font-size: 0.9rem; }
      .header-meta { display: none; }
      .message-attachments img { max-width: 180px; max-height: 140px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>AI Tutor</h1>
      <div class="header-meta">
        <span><span class="status-dot"></span>&ensp;<span id="model-label">loading...</span></span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-subtle" id="transcript-btn">Transcript</button>
      <button class="btn-subtle" id="end-session-btn">End session</button>
      <button class="btn-subtle" id="new-session-btn">New session</button>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty-state">
      <h2>What are you working on?</h2>
      <p>Share your problem — take a photo, upload a screenshot, or just type it out.</p>
    </div>
  </div>

  <div class="typing" id="typing-indicator">
    <span></span><span></span><span></span>
  </div>

  <div id="input-area">
    <div id="file-preview"></div>
    <form id="input-form">
      <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/gif,image/webp,application/pdf">
      <button type="button" id="attach-btn" title="Attach image or PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <!-- Transcript modal -->
  <div class="modal-overlay" id="transcript-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Session transcript</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <pre id="transcript-content">No messages yet.</pre>
      </div>
      <div class="modal-footer">
        <button class="btn-subtle" id="modal-close-btn">Close</button>
        <button class="btn-primary" id="copy-transcript-btn">Copy to clipboard</button>
      </div>
    </div>
  </div>

  <!-- Error toast -->
  <div class="toast" id="error-toast"></div>

  <script>
    const chatEl = document.getElementById("chat");
    const emptyState = document.getElementById("empty-state");
    const typingIndicator = document.getElementById("typing-indicator");
    const form = document.getElementById("input-form");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const modelLabel = document.getElementById("model-label");
    const transcriptBtn = document.getElementById("transcript-btn");
    const endSessionBtn = document.getElementById("end-session-btn");
    const newSessionBtn = document.getElementById("new-session-btn");
    const transcriptModal = document.getElementById("transcript-modal");
    const transcriptContent = document.getElementById("transcript-content");
    const modalClose = document.getElementById("modal-close");
    const modalCloseBtn = document.getElementById("modal-close-btn");
    const copyTranscriptBtn = document.getElementById("copy-transcript-btn");
    const errorToast = document.getElementById("error-toast");
    const fileInput = document.getElementById("file-input");
    const attachBtn = document.getElementById("attach-btn");
    const filePreview = document.getElementById("file-preview");

    // Session ID
    let sessionId = crypto.randomUUID();
    let sending = false;

    // Pending file attachments
    let pendingFiles = [];

    // Auto-resize textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    });

    // Shift+Enter for newline, Enter to send
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event("submit"));
      }
    });

    // Attach button opens file picker
    attachBtn.addEventListener("click", () => fileInput.click());

    // Handle file selection
    fileInput.addEventListener("change", () => {
      const newFiles = Array.from(fileInput.files);
      for (const file of newFiles) {
        if (pendingFiles.length >= 5) {
          showError("Maximum 5 files per message.");
          break;
        }
        if (file.size > 10 * 1024 * 1024) {
          showError(`${file.name} is too large.  Maximum 10 MB.`);
          continue;
        }
        pendingFiles.push(file);
      }
      fileInput.value = "";
      renderFilePreview();
    });

    // Drag and drop on the chat area
    chatEl.addEventListener("dragover", (e) => {
      e.preventDefault();
      chatEl.style.outline = "2px dashed var(--accent)";
      chatEl.style.outlineOffset = "-4px";
    });

    chatEl.addEventListener("dragleave", () => {
      chatEl.style.outline = "";
      chatEl.style.outlineOffset = "";
    });

    chatEl.addEventListener("drop", (e) => {
      e.preventDefault();
      chatEl.style.outline = "";
      chatEl.style.outlineOffset = "";
      const droppedFiles = Array.from(e.dataTransfer.files);
      for (const file of droppedFiles) {
        const allowed = ["image/jpeg", "image/png", "image/gif", "image/webp", "application/pdf"];
        if (!allowed.includes(file.type)) {
          showError(`${file.name}: unsupported file type.  Use images or PDFs.`);
          continue;
        }
        if (pendingFiles.length >= 5) {
          showError("Maximum 5 files per message.");
          break;
        }
        if (file.size > 10 * 1024 * 1024) {
          showError(`${file.name} is too large.  Maximum 10 MB.`);
          continue;
        }
        pendingFiles.push(file);
      }
      renderFilePreview();
    });

    function renderFilePreview() {
      filePreview.innerHTML = "";
      if (pendingFiles.length === 0) {
        filePreview.classList.remove("has-files");
        return;
      }
      filePreview.classList.add("has-files");

      pendingFiles.forEach((file, idx) => {
        const item = document.createElement("div");
        item.className = "preview-item";

        if (file.type === "application/pdf") {
          const icon = document.createElement("div");
          icon.className = "pdf-icon";
          icon.textContent = "PDF";
          item.appendChild(icon);
        } else {
          const img = document.createElement("img");
          img.src = URL.createObjectURL(file);
          item.appendChild(img);
        }

        const name = document.createElement("span");
        name.textContent = file.name.length > 20 ? file.name.slice(0, 18) + "..." : file.name;
        item.appendChild(name);

        const removeBtn = document.createElement("button");
        removeBtn.className = "remove-file";
        removeBtn.textContent = "×";
        removeBtn.addEventListener("click", () => {
          pendingFiles.splice(idx, 1);
          renderFilePreview();
        });
        item.appendChild(removeBtn);

        filePreview.appendChild(item);
      });
    }

    // Load config
    fetch("/api/config")
      .then((r) => r.json())
      .then((config) => {
        const thinking = config.extendedThinking ? " + thinking" : "";
        modelLabel.textContent = config.model + thinking;
      })
      .catch(() => {
        modelLabel.textContent = "disconnected";
      });

    // Send message
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if ((!text && pendingFiles.length === 0) || sending) return;

      sending = true;
      sendBtn.disabled = true;

      // Hide empty state
      emptyState.style.display = "none";

      // Capture files before clearing
      const filesToSend = [...pendingFiles];

      // Add student message to chat (with attachment previews)
      addMessage("student", text, filesToSend);

      // Clear input
      input.value = "";
      input.style.height = "auto";
      pendingFiles = [];
      renderFilePreview();

      // Show typing
      typingIndicator.classList.add("visible");
      scrollToBottom();

      try {
        // Build FormData
        const formData = new FormData();
        formData.append("sessionId", sessionId);
        if (text) formData.append("message", text);
        for (const file of filesToSend) {
          formData.append("files", file);
        }

        const res = await fetch("/api/chat", {
          method: "POST",
          body: formData,
        });

        typingIndicator.classList.remove("visible");

        if (!res.ok) {
          const err = await res.json();
          showError(err.error || "Something went wrong.");
          return;
        }

        const data = await res.json();
        addMessage("tutor", data.response);
      } catch (err) {
        typingIndicator.classList.remove("visible");
        showError("Could not reach the server.  Is it running?");
      } finally {
        sending = false;
        sendBtn.disabled = false;
        input.focus();
      }
    });

    function addMessage(role, text, files) {
      const div = document.createElement("div");
      div.className = `message ${role}`;

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = role === "student" ? "You" : "Tutor";
      div.appendChild(label);

      // Show attachment previews for student messages
      if (files && files.length > 0) {
        const attachments = document.createElement("div");
        attachments.className = "message-attachments";

        for (const file of files) {
          if (file.type === "application/pdf") {
            const badge = document.createElement("div");
            badge.className = "file-badge";
            badge.innerHTML = `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
              </svg>
              ${file.name}`;
            attachments.appendChild(badge);
          } else {
            const img = document.createElement("img");
            img.src = URL.createObjectURL(file);
            attachments.appendChild(img);
          }
        }

        div.appendChild(attachments);
      }

      // Text content
      if (text) {
        const paragraphs = text.split(/\n\n+/);
        for (const para of paragraphs) {
          const p = document.createElement("p");
          p.textContent = para.trim();
          if (p.textContent) div.appendChild(p);
        }
      }

      chatEl.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatEl.scrollTop = chatEl.scrollHeight;
      });
    }

    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.classList.add("visible");
      setTimeout(() => errorToast.classList.remove("visible"), 4000);
    }

    // Transcript modal
    transcriptBtn.addEventListener("click", async () => {
      try {
        const res = await fetch(`/api/transcript/${sessionId}`);
        if (!res.ok) {
          transcriptContent.textContent = "No messages yet.";
        } else {
          const data = await res.json();
          transcriptContent.textContent = data.transcript
            .map((entry) => `${entry.role}: ${entry.text}`)
            .join("\n\n");
        }
      } catch {
        transcriptContent.textContent = "Could not load transcript.";
      }
      transcriptModal.classList.add("visible");
    });

    modalClose.addEventListener("click", () => transcriptModal.classList.remove("visible"));
    modalCloseBtn.addEventListener("click", () => transcriptModal.classList.remove("visible"));
    transcriptModal.addEventListener("click", (e) => {
      if (e.target === transcriptModal) transcriptModal.classList.remove("visible");
    });

    copyTranscriptBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(transcriptContent.textContent).then(() => {
        copyTranscriptBtn.textContent = "Copied";
        setTimeout(() => { copyTranscriptBtn.textContent = "Copy to clipboard"; }, 2000);
      });
    });

    // Reset the UI to the empty state and generate a new session ID
    function resetUI() {
      sessionId = crypto.randomUUID();
      pendingFiles = [];
      renderFilePreview();
      chatEl.innerHTML = "";
      emptyState.style.display = "";
      chatEl.appendChild(emptyState);
      input.focus();
    }

    // End session — emails the summary, then resets the UI
    endSessionBtn.addEventListener("click", async () => {
      const currentId = sessionId;
      resetUI();
      try {
        await fetch("/api/end-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: currentId }),
        });
      } catch {
        // Best-effort — server-side sweep will catch it after 10 minutes
      }
    });

    // New session — server emails and clears session, frontend resets
    newSessionBtn.addEventListener("click", () => {
      const currentId = sessionId;
      resetUI();
      fetch("/api/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId: currentId }),
      }).catch(() => {});
    });

    // Best-effort email on tab close — server-side sweep catches failures at 10 min
    window.addEventListener("beforeunload", () => {
      const blob = new Blob([JSON.stringify({ sessionId })], { type: "application/json" });
      navigator.sendBeacon("/api/end-session", blob);
    });

    // Focus input on load
    input.focus();
  </script>
</body>
</html>
