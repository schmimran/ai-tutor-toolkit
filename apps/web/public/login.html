<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign in — Axiom AI Tutor</title>
  <meta name="theme-color" content="#0f1117">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <main class="login-shell">
    <div class="login-card">
      <h1 class="login-title">Axiom AI Tutor</h1>
      <p class="login-subtitle">Sign in or create an account</p>

      <div class="login-tabs" role="tablist">
        <button type="button" class="login-tab active" data-tab="login" role="tab" aria-selected="true">Sign in</button>
        <button type="button" class="login-tab" data-tab="register" role="tab" aria-selected="false">Register</button>
      </div>

      <!-- ── Sign in panel ─────────────────────────────────────────────── -->
      <form class="login-panel active" id="login-panel" autocomplete="on">
        <label class="login-field">
          <span class="login-label">Email</span>
          <input type="email" id="login-email" class="login-input" autocomplete="email" required>
        </label>
        <label class="login-field">
          <span class="login-label">Password</span>
          <input type="password" id="login-password" class="login-input" autocomplete="current-password" required minlength="8">
        </label>
        <button type="submit" class="login-btn login-btn-primary" id="btn-login">Sign in</button>
        <button type="button" class="login-btn" id="btn-resend-verification" style="display:none">Resend verification email</button>
        <button type="button" class="login-forgot-link" id="btn-show-forgot">Forgot password?</button>
      </form>

      <!-- ── Forgot password panel ─────────────────────────────────────── -->
      <div class="login-panel" id="forgot-panel">
        <button type="button" class="login-forgot-link" id="btn-back-to-login">&larr; Back to sign in</button>
        <p class="login-label" style="margin:0">Enter your email and we'll send you a reset link.</p>
        <label class="login-field">
          <span class="login-label">Email</span>
          <input type="email" id="forgot-email" class="login-input" autocomplete="email" required>
        </label>
        <button type="button" class="login-btn login-btn-primary" id="btn-forgot">Send reset link</button>
      </div>

      <!-- ── Register panel ────────────────────────────────────────────── -->
      <form class="login-panel" id="register-panel" autocomplete="on">
        <label class="login-field">
          <span class="login-label">Full name</span>
          <input type="text" id="register-name" class="login-input" autocomplete="name" required>
        </label>
        <label class="login-field">
          <span class="login-label">Email</span>
          <input type="email" id="register-email" class="login-input" autocomplete="email" required>
        </label>
        <label class="login-field">
          <span class="login-label">Password</span>
          <input type="password" id="register-password" class="login-input" autocomplete="new-password" required minlength="8">
          <span class="login-hint">At least 8 characters.</span>
        </label>
        <label class="login-field">
          <span class="login-label">Birthdate</span>
          <input type="date" id="register-birthdate" class="login-input" autocomplete="bday" required>
          <span class="login-hint">You must be at least 13 to register.</span>
        </label>
        <label class="login-field">
          <span class="login-label">Grade level</span>
          <select id="register-grade" class="login-input" required>
            <option value="" disabled selected>Select grade</option>
            <option value="6th">6th</option>
            <option value="7th">7th</option>
            <option value="8th">8th</option>
            <option value="9th">9th</option>
            <option value="10th">10th</option>
            <option value="11th">11th</option>
            <option value="12th">12th</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label class="login-field">
          <span class="login-label">State / Province <span class="login-hint-inline">(optional)</span></span>
          <input type="text" id="register-state" class="login-input" autocomplete="address-level1">
        </label>
        <label class="login-field">
          <span class="login-label">Country <span class="login-hint-inline">(optional)</span></span>
          <input type="text" id="register-country" class="login-input" autocomplete="country-name">
        </label>
        <label class="login-checkbox-row">
          <input type="checkbox" id="register-terms">
          <span class="login-checkbox-label">I understand this is an early prototype. AI can make mistakes — always verify important information with a teacher or trusted source.</span>
        </label>
        <button type="submit" class="login-btn login-btn-primary" id="btn-register">Create account</button>
      </form>

      <!-- ── Post-registration verification panel ─────────────────────── -->
      <div class="login-panel verify-overlay" id="verify-panel">
        <h2 class="verify-heading">Check your email</h2>
        <p class="verify-body">We sent a verification link to <strong id="verify-email"></strong>. Click the link in that email to activate your account, then sign in.</p>
        <p class="verify-countdown">This link expires in <span id="verify-countdown">60:00</span>.</p>
        <button type="button" class="login-btn" id="btn-resend-signup" disabled>Resend verification email</button>
        <p class="verify-back-note">
          <button type="button" class="verify-link-btn" id="btn-verify-back">Back to sign in</button>
        </p>
      </div>

      <p class="login-error" id="login-error" style="display:none"></p>
      <p class="login-success" id="login-success" style="display:none"></p>
      <p class="login-contact-note" id="login-contact-note"></p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3/dist/umd/supabase.js"></script>
  <script src="/auth.js"></script>
  <script src="/login.js"></script>
</body>
</html>
